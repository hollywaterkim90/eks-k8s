spring:
  config:
    activate:
      on-profile: local
  application:
    name: member-service
  redis:
    host: localhost
    port: 6379
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/ordermsa
    username: postgres
    password: 1234
  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    generate-ddl: true
    hibernate:
      ddl-auto: create
    show_sql: true
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

server:
#  0으로 세팅하면 spring이 임의 port를 할당
  port: 0

jwt:
  expiration: 1000
