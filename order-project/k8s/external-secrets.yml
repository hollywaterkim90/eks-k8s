# External Secrets Operator 리소스
# AWS Secrets Manager(prod-rds-master-credentials) → k8s Secret(my-app-secrets) 동기화
#
# 사전 조건:
#   - ESO가 클러스터에 설치돼 있어야 함 (인프라 repo의 external-secrets.tf helm_release로 설치)
#   - ESO 컨트롤러 SA(external-secrets/external-secrets)에 Pod Identity로
#     secretsmanager:GetSecretValue 권한이 연결돼 있어야 함 (external-secrets.tf)

# 1. AWS Secrets Manager를 가리키는 ClusterSecretStore
#    인증: 별도 auth 블록 없이 ESO 컨트롤러 Pod의 Pod Identity 자격증명을 사용
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
---
# 2. RDS 크레덴셜을 sskim 네임스페이스의 my-app-secrets Secret으로 투영
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: my-app-secrets
  namespace: sskim
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: my-app-secrets   # 🌟 Deployment들이 참조하는 Secret 이름과 정확히 일치
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST   # RDS 엔드포인트(host)
      remoteRef:
        key: prod-rds-master-credentials
        property: host
    - secretKey: DB_PW     # RDS 마스터 패스워드
      remoteRef:
        key: prod-rds-master-credentials
        property: password
